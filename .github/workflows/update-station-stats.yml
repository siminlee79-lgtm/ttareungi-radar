name: Update station stats

on:
  workflow_dispatch:
  schedule:
    # 18:20 UTC is 03:20 KST. Run monthly after Seoul data files are usually published.
    - cron: "20 18 3 * *"

permissions:
  contents: write

jobs:
  update-station-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download latest daily usage CSV and build stats
        run: npm run stats:update

      - name: Commit updated station stats
        run: |
          if git diff --quiet -- data/station-stats.json; then
            echo "station-stats.json is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/station-stats.json
          git commit -m "Update station stats"
          git push
